<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMind：算法边界</title>
  <link rel="stylesheet" href="style.css?v=20260517-clearflow" />
</head>
<body>
  <main class="game-shell">
    <section class="stage location-black" id="stage">
      <div class="backdrop-noise"></div>
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">N</span>
          <div>
            <strong>NovaMind：算法边界</strong>
            <span id="locationName">黑屏 / 2032</span>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="collectionButton" type="button" aria-expanded="false">结局</button>
          <button class="icon-button" id="evidenceButton" type="button" aria-expanded="false">证据</button>
          <button class="icon-button" id="historyButton" type="button" aria-expanded="false">历史</button>
          <button class="icon-button" id="profileButton" type="button" aria-expanded="false">人物</button>
          <button class="ghost-button" id="restartButton" type="button">重新开始</button>
        </div>
      </header>

      <aside class="side-drawer text-drawer fullscreen-drawer collection-drawer" id="collectionDrawer" aria-label="结局与分支收集">
        <div class="drawer-head">
          <div>
            <strong>结局与分支</strong>
            <span id="collectionSummary">已解锁 0 / 5 个结局</span>
          </div>
          <button class="drawer-close" id="collectionCloseButton" type="button">关闭</button>
        </div>
        <div class="collection-layout">
          <section>
            <h2>剧情流程图</h2>
            <div class="branch-map" id="branchMap"></div>
          </section>
        </div>
      </aside>

      <aside class="side-drawer text-drawer fullscreen-drawer" id="historyDrawer" aria-label="历史对话">
        <div class="drawer-head">
          <div>
            <strong>历史对话</strong>
            <span>最近的剧情文本会记录在这里</span>
          </div>
          <button class="drawer-close" id="historyCloseButton" type="button">关闭</button>
        </div>
        <div class="drawer-list" id="historyList"></div>
      </aside>

      <aside class="side-drawer text-drawer" id="evidenceDrawer" aria-label="证据记录">
        <div class="drawer-head">
          <strong>证据记录</strong>
          <span>你主动查看或保存过的线索</span>
        </div>
        <div class="drawer-list" id="evidenceList"></div>
      </aside>

      <aside class="side-drawer text-drawer fullscreen-drawer" id="profileDrawer" aria-label="人物信息">
        <div class="drawer-head">
          <div>
            <strong>人物信息</strong>
            <span>主要角色和他们的立场</span>
          </div>
          <button class="drawer-close" id="profileCloseButton" type="button">关闭</button>
        </div>
        <div class="drawer-list" id="profileList"></div>
      </aside>

      <div class="scene-transition hidden" id="sceneTransition" aria-hidden="true">
        <div class="transition-card">
          <span id="transitionChapter">下一幕</span>
          <strong id="transitionLocation">NovaMind</strong>
          <em id="transitionTime">2032</em>
        </div>
      </div>

      <section class="visual-area">
        <div class="scene-meta">
          <span id="chapterChip">开场</span>
          <span id="sceneClock">2032年8月12日 08:40</span>
        </div>

        <div class="news-banner hidden" id="newsBanner">
          <span>热搜 1</span>
          <strong id="newsText">NovaMind 操控用户情绪</strong>
        </div>

        <div class="character-layer" id="characterLayer"></div>
      </section>

      <div class="event-popup hidden" id="eventPopup" role="dialog" aria-modal="true" aria-labelledby="eventTitle">
        <div class="event-card">
          <div class="event-label" id="eventLabel">SYSTEM</div>
          <h2 id="eventTitle">消息</h2>
          <p id="eventBody"></p>
          <button class="next-button" id="eventCloseButton" type="button">关闭</button>
        </div>
      </div>

      <section class="dialogue-panel" id="dialoguePanel">
        <div class="speaker-row">
          <div>
            <div class="speaker" id="speaker">旁白</div>
            <div class="speaker-role" id="speakerRole">叙事</div>
          </div>
        </div>
        <p class="dialogue-text" id="dialogueText"></p>
        <div class="choices" id="choices"></div>
      </section>
    </section>
  </main>

  <script src="game.js?v=20260517-clearflow"></script>
</body>
</html>
