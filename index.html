<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMind：算法边界</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <section class="stage location-black" id="stage">
      <div class="backdrop-noise"></div>
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">N</span>
          <div>
            <strong>NovaMind：算法边界</strong>
            <span id="locationName">黑屏 / 2032</span>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="statsButton" type="button" aria-expanded="false">属性</button>
          <button class="icon-button" id="evidenceButton" type="button" aria-expanded="false">证据</button>
          <button class="icon-button" id="historyButton" type="button" aria-expanded="false">历史</button>
          <button class="icon-button" id="profileButton" type="button" aria-expanded="false">人物</button>
          <button class="ghost-button" id="restartButton" type="button">重新开始</button>
        </div>
      </header>

      <aside class="side-drawer stats-drawer" id="statsDrawer" aria-label="玩家属性">
        <div class="drawer-head">
          <strong>工程师状态</strong>
          <span>数值会影响最终结局</span>
        </div>
        <div class="stat" data-stat="profit">
          <div class="stat-head"><span>公司利润</span><b id="profitValue">50</b></div>
          <div class="meter"><i id="profitBar"></i></div>
        </div>
        <div class="stat" data-stat="happiness">
          <div class="stat-head"><span>用户幸福度</span><b id="happinessValue">50</b></div>
          <div class="meter"><i id="happinessBar"></i></div>
        </div>
        <div class="stat" data-stat="ethics">
          <div class="stat-head"><span>伦理风险</span><b id="ethicsValue">20</b></div>
          <div class="meter"><i id="ethicsBar"></i></div>
        </div>
        <div class="stat" data-stat="privacy">
          <div class="stat-head"><span>隐私安全</span><b id="privacyValue">70</b></div>
          <div class="meter"><i id="privacyBar"></i></div>
        </div>
      </aside>

      <aside class="side-drawer text-drawer" id="historyDrawer" aria-label="历史对话">
        <div class="drawer-head">
          <strong>历史对话</strong>
          <span>最近的剧情文本会记录在这里</span>
        </div>
        <div class="drawer-list" id="historyList"></div>
      </aside>

      <aside class="side-drawer text-drawer" id="evidenceDrawer" aria-label="证据记录">
        <div class="drawer-head">
          <strong>证据记录</strong>
          <span>你主动查看或保存过的线索</span>
        </div>
        <div class="drawer-list" id="evidenceList"></div>
      </aside>

      <aside class="side-drawer text-drawer" id="profileDrawer" aria-label="人物信息">
        <div class="drawer-head">
          <strong>人物信息</strong>
          <span>主要角色和他们的立场</span>
        </div>
        <div class="drawer-list" id="profileList"></div>
      </aside>

      <section class="visual-area">
        <div class="scene-meta">
          <span id="chapterChip">开场</span>
          <span id="sceneClock">2032 / 08:40</span>
        </div>

        <div class="news-banner hidden" id="newsBanner">
          <span>热搜 1</span>
          <strong id="newsText">NovaMind 操控用户情绪</strong>
        </div>

        <div class="character-layer" id="characterLayer"></div>
      </section>

      <section class="dialogue-panel">
        <div class="speaker-row">
          <div>
            <div class="speaker" id="speaker">旁白</div>
            <div class="speaker-role" id="speakerRole">叙事</div>
          </div>
          <button class="next-button hidden" id="nextButton" type="button">继续</button>
        </div>
        <p class="dialogue-text" id="dialogueText"></p>
        <div class="choices" id="choices"></div>
      </section>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
